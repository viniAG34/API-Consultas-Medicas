# Referência real da config de Nginx em /opt/lacrei/nginx/conf.d/ na EC2 (SDD-07).
# Bloco 80->443 e diretivas ssl_certificate* foram inseridos pelo Certbot
# (--nginx) na emissão do certificado — reproduzidos aqui como referência,
# sem os certificados em si (ficam só na instância).

server {
    listen 80;
    server_name api-lacrei.<dominio>;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api-lacrei.<dominio>;

    ssl_certificate     /etc/letsencrypt/live/api-lacrei.<dominio>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-lacrei.<dominio>/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparam.pem;

    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Necessário para SECURE_PROXY_SSL_HEADER (config/settings/production.py)
        # reconhecer a requisição como HTTPS — sem isso, SECURE_SSL_REDIRECT
        # entra em loop de redirecionamento para todo tráfego externo.
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
